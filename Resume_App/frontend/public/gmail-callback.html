<!DOCTYPE html>
<html>
<head><title>Connecting Gmail...</title>
<style>
  body { font-family: Arial, sans-serif; display: flex; align-items: center; justify-content: center;
    min-height: 100vh; margin: 0; background: #f0f4ff; }
  .card { background: #fff; border-radius: 12px; padding: 32px; text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.1); max-width: 360px; width: 90%; }
  h2 { color: #1a1a2e; font-size: 18px; margin: 0 0 8px; }
  p { color: #718096; font-size: 13px; }
  .spinner { width: 32px; height: 32px; border: 3px solid #e2e8f0;
    border-top-color: #4285f4; border-radius: 50%; animation: spin 0.8s linear infinite;
    margin: 16px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="spinner"></div>
  <h2>Connecting Gmail...</h2>
  <p id="status">Exchanging authorization code...</p>
</div>
<script>
  const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
    ? 'http://localhost:8000'
    : 'https://jobfinder-production-f66a.up.railway.app';

  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');

  if (error) {
    document.getElementById('status').textContent = 'Error: ' + error;
    document.querySelector('.spinner').style.display = 'none';
  } else if (code) {
    const fd = new FormData();
    fd.append('code', code);

    fetch(API + '/gmail/callback', { method: 'POST', body: fd })
      .then(r => r.json())
      .then(tokens => {
        if (tokens.access_token) {
          // Store in localStorage so parent window can pick it up
          localStorage.setItem('gmail_tokens', JSON.stringify(tokens));
          localStorage.setItem('gmail_oauth_done', Date.now().toString());
          document.querySelector('.spinner').style.display = 'none';
          document.querySelector('h2').textContent = 'Gmail Connected!';
          document.getElementById('status').textContent = 'Connected as ' + (tokens.email || '');
          document.getElementById('status').style.color = '#38a169';
          setTimeout(() => window.close(), 1500);
        } else {
          document.getElementById('status').textContent = 'Failed: ' + JSON.stringify(tokens);
          document.querySelector('.spinner').style.display = 'none';
        }
      })
      .catch(e => {
        document.getElementById('status').textContent = 'Connection error: ' + e.message;
        document.querySelector('.spinner').style.display = 'none';
      });
  } else {
    document.getElementById('status').textContent = 'No authorization code received.';
    document.querySelector('.spinner').style.display = 'none';
  }
</script>
</body>
</html>
