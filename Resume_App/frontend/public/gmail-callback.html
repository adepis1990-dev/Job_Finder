<!DOCTYPE html>
<html>
<head><title>Connecting Gmail...</title></head>
<body>
<p>Connecting your Gmail account...</p>
<script>
  // Just redirect back to the main app with the code in URL
  // The React app will handle the token exchange
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');

  if (code) {
    window.location.href = '/?gmail_code=' + encodeURIComponent(code);
  } else {
    window.location.href = '/?gmail_error=' + encodeURIComponent(error || 'unknown');
  }
</script>
</body>
</html>
